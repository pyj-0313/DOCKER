# ===== 이벤트 처리 설정 (필수 블록) =====
events {
    worker_connections 1024;
}

http {
    server {
        listen       80;
        server_name  localhost;

        # ===== ① API 요청 → Spring Boot 컨테이너로 프록시 =====
        # / 로 시작하는 요청은 정적 파일이 아니라 백엔드로 전달
        location /bn/ {
            # 같은 Docker 네트워크의 컨테이너 이름으로 접근
            # (nginx 컨테이너와 bn-container가 같은 my-network에 있어야 함)
            proxy_pass http://bn-container:8080/;

            # 원래 요청의 정보를 백엔드에 전달 (로그, 인증 등에 필요)
            proxy_set_header Host $host;                          # 원래 요청의 Host
            proxy_set_header X-Real-IP $remote_addr;              # 실제 클라이언트 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 프록시 경유 IP 목록
            proxy_set_header X-Forwarded-Proto $scheme;           # http/https 여부
        }

        # ===== ② React 정적 파일 서빙 =====
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            # SPA 라우팅: 파일 없으면 index.html 반환
            try_files $uri /index.html;
        }

        error_page  500 502 503 504 /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
